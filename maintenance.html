<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarnYourCert · En mantenimiento</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%230F6CBD'/%3E%3Cg fill='none' stroke='white' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M21 9 12 5 3 9l9 4 9-4z'/%3E%3Cpath d='M7 11v4c0 .9 2.2 2 5 2s5-1.1 5-2v-4'/%3E%3C/g%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#0F6CBD;--accent-l:#4CA0E8;
    --bg:#F5F7FA;--panel:#FFFFFF;--ink:#0F1923;--ink-2:#4A5568;--ink-3:#8E9BAA;
    --line:#E2E8F0;--radius:18px;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#0E1116;--panel:#171B22;--ink:#E8ECF1;--ink-2:#AEB6C0;--ink-3:#7C8593;
      --line:#262C36;
    }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'IBM Plex Sans',system-ui,sans-serif;
    background:var(--bg);color:var(--ink);
    display:grid;place-items:center;min-height:100vh;
    padding:24px;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius);
    padding:52px 48px;text-align:center;
    max-width:480px;width:100%;
    box-shadow:0 8px 40px rgba(0,0,0,.08);
  }
  .logo-wrap{
    width:72px;height:72px;border-radius:18px;
    background:linear-gradient(135deg,var(--accent),var(--accent-l));
    display:grid;place-items:center;margin:0 auto 20px;
    box-shadow:0 4px 16px rgba(15,108,189,.35);
  }
  .logo-wrap svg{color:#fff}
  h1{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;font-size:11px;
    font-weight:500;letter-spacing:.1em;text-transform:uppercase;
    color:var(--accent);margin-bottom:24px;
  }
  .icon-wrap{
    width:56px;height:56px;border-radius:50%;
    background:rgba(15,108,189,.1);
    display:grid;place-items:center;margin:0 auto 22px;
    color:var(--accent);
  }
  h2{font-size:26px;font-weight:700;letter-spacing:-.02em;margin-bottom:12px}
  p{color:var(--ink-2);font-size:15.5px;line-height:1.6;max-width:360px;margin:0 auto}
  .eta{
    margin-top:28px;padding:14px 20px;
    background:rgba(15,108,189,.07);border:1px solid rgba(15,108,189,.18);
    border-radius:10px;font-size:13.5px;color:var(--ink-2);
    display:none; /* mostrar solo si hay ETA */
  }
  .eta strong{color:var(--ink);font-weight:600}
  .eta[data-show]{display:block}
  footer{margin-top:28px;font-size:12.5px;color:var(--ink-3)}
  @media(max-width:480px){
    .card{padding:36px 24px}
    h2{font-size:22px}
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 10 12 5 2 10l10 5 10-5z"/>
      <path d="M6 12v5c0 1 2.7 3 6 3s6-2 6-3v-5"/>
      <path d="M22 10v6"/>
    </svg>
  </div>
  <div class="eyebrow">EarnYourCert</div>
  <div class="icon-wrap">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
    </svg>
  </div>
  <h2>Estamos mejorando la plataforma</h2>
  <p>Volveremos en unos minutos. Gracias por tu paciencia.</p>

  <!-- Descomentar y rellenar si quieres mostrar hora estimada de vuelta -->
  <!-- <div class="eta" data-show>Estimamos volver a las <strong>15:30 CET</strong></div> -->

  <footer>© 2026 EarnYourCert</footer>
</div>
</body>
</html>
